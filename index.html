<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>지역별 장소 + 팀에이전트</title>
<style>
  :root {
    --bg: #f5f7fb;
    --panel: #ffffff;
    --panel-2: #f0f3fa;
    --line: #dee3ee;
    --text: #1f2540;
    --muted: #6b7390;
    --accent: #4263eb;
    --accent-2: #8b5cf6;
    --good: #16a34a;
    --warn: #ea8a1e;
    --pink: #db2777;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
  }
  header {
    padding: 22px 28px;
    background: linear-gradient(135deg, #e8eefc 0%, #f1e8fc 100%);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: -0.3px; }
  header .sub { color: var(--muted); font-size: 13px; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(66,99,235,0.12);
    color: var(--accent);
    font-size: 12px;
    margin-left: 8px;
  }

  main {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 20px;
    padding: 20px 28px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 980px) {
    main { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 15px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s ease;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
    font-weight: 600;
  }

  .region-group { margin-bottom: 18px; }
  .region-title {
    font-size: 14px;
    color: var(--accent-2);
    margin: 6px 0 10px;
    padding-left: 6px;
    border-left: 3px solid var(--accent-2);
  }
  .place-list {
    display: grid;
    gap: 8px;
  }
  .place {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .place:hover { border-color: var(--accent); transform: translateY(-1px); }
  .place.selected {
    border-color: var(--accent);
    background: rgba(66,99,235,0.08);
    box-shadow: 0 0 0 2px rgba(66,99,235,0.18);
  }
  .place .name { font-weight: 600; }
  .place .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .place .pin { font-size: 18px; }

  /* Team agent panel */
  .agent-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .agent-tab {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .agent-tab.active { border-color: var(--accent); background: rgba(66,99,235,0.1); }
  .agent-tab .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--good);
  }

  .agent-card {
    background: var(--panel-2);
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--line);
  }
  .agent-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 22px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
  }
  .agent-name { font-weight: 700; font-size: 15px; }
  .agent-role { font-size: 12px; color: var(--muted); }
  .agent-msg {
    background: rgba(66,99,235,0.04);
    border-left: 3px solid var(--accent);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-line;
  }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 30px 10px;
    font-size: 13px;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--line);
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📍 지역별 장소 앱 <span class="badge">팀에이전트</span></h1>
    <div class="sub">메모.xlsx 데이터 · 3명의 AI 팀에이전트가 추천을 도와드립니다</div>
  </div>
  <div class="sub" id="stats">로딩중...</div>
</header>

<main>
  <!-- 왼쪽: 장소 패널 -->
  <section class="card">
    <h2>장소 목록</h2>
    <div class="filter-bar" id="filterBar"></div>
    <div id="placeContainer"></div>
  </section>

  <!-- 오른쪽: 팀에이전트 패널 -->
  <section class="card">
    <h2>팀 에이전트</h2>
    <div class="agent-tabs" id="agentTabs"></div>
    <div id="agentBody"></div>
  </section>
</main>

<footer>
  메모.xlsx 출처 · 3 장소 / 2 지역 · 단일 HTML · 외부 의존성 없음
</footer>

<script>
// 메모.xlsx 데이터
const PLACES = [
  { province: '충북',   region: '도대리',   name: '용소폭포',         tag: '폭포·자연' },
  { province: '경기도', region: '포천',     name: '도마치',           tag: '계곡·드라이브' },
  { province: '경기도', region: '남양주',   name: '청학밸리리조트',   tag: '리조트·물놀이' },
];

// 팀에이전트 정의
const AGENTS = [
  {
    id: 'planner',
    icon: '🧭',
    name: '여행 플래너',
    role: '동선·일정 추천',
    advise: (p) => {
      const map = {
        '용소폭포': '충북 도대리 용소폭포는 서울에서 약 2시간 거리.\n오전 9시 출발 → 오후 12시 도착 → 폭포 트레킹 1시간 → 점심(현지 산채정식) 추천.\n돌아오는 길에 단양 도담삼봉 경유 가능합니다.',
        '도마치':   '포천 도마치 계곡은 여름 피서 1순위.\n주말은 정체가 심하므로 평일 또는 오전 8시 이전 출발 권장.\n포천 이동갈비 식당과 묶어 1일 코스로 짜면 좋습니다.',
        '청학밸리리조트': '남양주 청학밸리는 가족 단위 추천.\n물놀이 4시간 + 인근 카페거리 산책 + 마석 한정식 코스로 6시간이면 충분합니다.',
      };
      return map[p.name];
    },
  },
  {
    id: 'local',
    icon: '🏞️',
    name: '로컬 가이드',
    role: '지역 특색·맛집',
    advise: (p) => {
      const map = {
        '용소폭포': '도대리는 백두대간 청정 지역. 산채비빔밥, 송이전골이 별미.\n주변 천동동굴·도담삼봉도 30분 거리에 있어 함께 묶기 좋습니다.',
        '도마치':   '포천은 막걸리·이동갈비·산정호수가 유명.\n도마치 계곡 상류는 수심이 깊으니 어린이 동반 시 하류 평탄 구간 이용하세요.',
        '청학밸리리조트': '남양주는 능내 카페거리, 다산 정약용 유적지가 인근.\n저녁엔 마석 한정식·평내 닭갈비 거리가 인기입니다.',
      };
      return map[p.name];
    },
  },
  {
    id: 'safety',
    icon: '🛡️',
    name: '안전 체크',
    role: '날씨·주의사항',
    advise: (p) => {
      const map = {
        '용소폭포': '폭포 주변 바위는 미끄럼 주의. 등산화 권장.\n장마철(7월) 수량 급증 시 출입 통제될 수 있으니 사전 확인 필수.',
        '도마치':   '계곡 수심 변화가 큰 구간 존재. 구명조끼 착용 권장.\n취사·야영 금지 구역 단속 강화 — 지정 데크 이용하세요.',
        '청학밸리리조트': '리조트 내 워터파크 시설 — 안전요원 상주.\n주차 공간 협소 — 성수기 오전 10시 이전 도착 권장.',
      };
      return map[p.name];
    },
  },
];

// 상태
let state = {
  filter: 'ALL',
  selectedPlace: null,
  activeAgent: 'planner',
};

// 렌더링
function render() {
  renderStats();
  renderFilter();
  renderPlaces();
  renderAgentTabs();
  renderAgentBody();
}

function renderStats() {
  const provinces = new Set(PLACES.map(p => p.province));
  document.getElementById('stats').textContent =
    `${PLACES.length}개 장소 · ${provinces.size}개 도(道)`;
}

function renderFilter() {
  const provinces = ['ALL', ...new Set(PLACES.map(p => p.province))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = provinces.map(pv => `
    <div class="chip ${state.filter === pv ? 'active' : ''}" data-pv="${pv}">
      ${pv === 'ALL' ? '전체' : pv}
    </div>
  `).join('');
  bar.querySelectorAll('.chip').forEach(el => {
    el.onclick = () => { state.filter = el.dataset.pv; render(); };
  });
}

function renderPlaces() {
  const filtered = state.filter === 'ALL' ? PLACES : PLACES.filter(p => p.province === state.filter);
  const grouped = {};
  filtered.forEach(p => {
    if (!grouped[p.province]) grouped[p.province] = [];
    grouped[p.province].push(p);
  });

  const c = document.getElementById('placeContainer');
  if (filtered.length === 0) {
    c.innerHTML = `<div class="empty">해당 지역에 장소가 없습니다.</div>`;
    return;
  }

  c.innerHTML = Object.entries(grouped).map(([prov, list]) => `
    <div class="region-group">
      <div class="region-title">${prov}</div>
      <div class="place-list">
        ${list.map(p => `
          <div class="place ${state.selectedPlace?.name === p.name ? 'selected' : ''}"
               data-name="${p.name}">
            <div>
              <div class="name">${p.name}</div>
              <div class="sub">${p.region} · ${p.tag}</div>
            </div>
            <div class="pin">📌</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  c.querySelectorAll('.place').forEach(el => {
    el.onclick = () => {
      state.selectedPlace = PLACES.find(p => p.name === el.dataset.name);
      render();
    };
  });
}

function renderAgentTabs() {
  const t = document.getElementById('agentTabs');
  t.innerHTML = AGENTS.map(a => `
    <div class="agent-tab ${state.activeAgent === a.id ? 'active' : ''}" data-id="${a.id}">
      <span class="dot"></span>
      ${a.icon} ${a.name}
    </div>
  `).join('');
  t.querySelectorAll('.agent-tab').forEach(el => {
    el.onclick = () => { state.activeAgent = el.dataset.id; render(); };
  });
}

function renderAgentBody() {
  const agent = AGENTS.find(a => a.id === state.activeAgent);
  const body = document.getElementById('agentBody');
  if (!state.selectedPlace) {
    body.innerHTML = `
      <div class="agent-card">
        <div class="agent-head">
          <div class="avatar">${agent.icon}</div>
          <div>
            <div class="agent-name">${agent.name}</div>
            <div class="agent-role">${agent.role}</div>
          </div>
        </div>
        <div class="empty">왼쪽에서 장소를 선택하면 ${agent.name}가 분석을 시작합니다.</div>
      </div>
    `;
    return;
  }
  const msg = agent.advise(state.selectedPlace);
  body.innerHTML = `
    <div class="agent-card">
      <div class="agent-head">
        <div class="avatar">${agent.icon}</div>
        <div>
          <div class="agent-name">${agent.name}</div>
          <div class="agent-role">${agent.role} · 선택: <b>${state.selectedPlace.name}</b></div>
        </div>
      </div>
      <div class="agent-msg">${msg}</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
